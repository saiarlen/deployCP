<div style="max-width:36rem">
  <div class="content-card">
    <h2 class="content-card-title">{{ Title }}</h2>
    <form action="{{ Action }}" method="post" style="display:flex;flex-direction:column;gap:var(--space-4)">
      <input type="hidden" name="_csrf" value="{{ CSRFToken }}">

      <div class="form-grid">
        <label style="font-size:0.875rem;font-weight:500;color:var(--text-sec)">Username
          <input class="field" style="margin-top:6px" name="username" required>
        </label>
        <label style="font-size:0.875rem;font-weight:500;color:var(--text-sec)">Password (blank to auto-generate)
          <input class="field" style="margin-top:6px" name="password" type="password" autocomplete="new-password">
        </label>
        <label style="font-size:0.875rem;font-weight:500;color:var(--text-sec)">Home Directory
          <input class="field" style="margin-top:6px" name="home_directory" placeholder="/var/www/siteuser" required>
        </label>
        <label style="font-size:0.875rem;font-weight:500;color:var(--text-sec)">Allowed Root
          <input class="field" style="margin-top:6px" name="allowed_root" placeholder="/var/www/siteuser/public" required>
        </label>
        <label style="font-size:0.875rem;font-weight:500;color:var(--text-sec)">SSH Enabled
          <select class="field" style="margin-top:6px" name="ssh_enabled">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </label>
      </div>

      <p style="font-size:0.8125rem;color:var(--text-muted)">Users are provisioned through the platform adapter and restricted by shell policy and ownership boundaries.</p>

      <div style="display:flex;gap:var(--space-2)">
        <button class="btn btn-primary" type="submit">Create Site User</button>
        <a class="btn" href="/site-users">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
